name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build photo manifest
        run: node scripts/build-manifest.js

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html styles.css app.js photos.json CNAME _site/
          if [ -d images ] && [ "$(ls images/ 2>/dev/null)" ]; then
            cp -r images _site/
          else
            mkdir _site/images
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
